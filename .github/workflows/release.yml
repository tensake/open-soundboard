name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-24.04"
            target: ""
            name: "Linux-x86"
          - platform: "ubuntu-24.04-arm"
            target: ""
            name: "Linux-ARM"
          - platform: "windows-latest"
            target: ""
            name: "Windows-x86"
          - platform: "windows-11-arm"
            target: ""
            name: "Windows-ARM"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.platform }}-${{ matrix.target }}

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libgtk-3-dev xdg-utils libdbus-1-dev pkg-config file libasound2-dev libpipewire-0.3-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Tauri Info
        run: bun tauri info

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "Open SoundBoard v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
          assetNamePattern: "[name]-v[version]_${{ matrix.name }}[ext]"
